<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Угадай художника</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --text:#f0f0f0;
  --muted:#888;
  --accent:#c8a96e;
}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;font-family:inherit;}

/* HOME */
#home{padding:0;}
.home-header{padding:2.5rem 2rem 1.5rem;text-align:center;border-bottom:1px solid var(--border);}
.home-header h1{font-size:clamp(2rem,4.5vw,3.5rem);font-weight:400;letter-spacing:.02em;color:var(--accent);margin-bottom:.6rem;font-family:"Playfair Display",Georgia,serif;font-style:italic;line-height:1.2;}
.home-header .author{font-size:.85rem;color:var(--muted);letter-spacing:.08em;font-style:italic;}

.trio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);}
.trio-card{background:var(--surface);padding:0;cursor:pointer;transition:background .2s;overflow:hidden;}
.trio-card:hover{background:var(--surface2);}
.trio-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;opacity:.85;transition:opacity .3s;}
.trio-card:hover .trio-thumb{opacity:1;}
.trio-info{padding:1.25rem 1.5rem 1.5rem;}
.trio-num{font-size:.75rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.4rem;}
.trio-title{font-size:1.05rem;color:var(--text);line-height:1.4;}

/* HOME bottom CTA */
.home-all-quiz{padding:2rem;text-align:center;border-top:1px solid var(--border);}
.all-quiz-btn{display:inline-block;background:none;border:1px solid var(--accent);color:var(--accent);padding:.85rem 2.5rem;font-size:1rem;font-family:'Playfair Display',Georgia,serif;font-style:italic;border-radius:2px;transition:all .2s;letter-spacing:.03em;}
.all-quiz-btn:hover{background:var(--accent);color:#000;}
.all-quiz-hint{font-size:.8rem;color:#444;margin-top:.75rem;font-style:italic;}

/* GALLERY */
#gallery{display:none;}
.gallery-top{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .9rem;font-size:.85rem;border-radius:2px;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.gallery-title{font-size:.95rem;color:var(--muted);font-style:italic;flex:1;text-align:center;}
.mode-tabs{display:flex;gap:1px;background:var(--border);}
.mode-tab{background:var(--surface2);border:none;color:var(--muted);padding:.4rem 1rem;font-size:.8rem;letter-spacing:.05em;transition:all .2s;}
.mode-tab.active{background:var(--accent);color:#000;}

/* COVERS */
.big-cover{display:none;min-height:calc(100vh - 50px);align-items:center;justify-content:center;flex-direction:column;gap:1.8rem;background:var(--bg);cursor:pointer;user-select:none;}
.cover-num{font-size:.85rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
.cover-name{font-size:clamp(2.5rem,7vw,6rem);font-weight:400;color:var(--accent);letter-spacing:.02em;text-align:center;padding:0 1rem;font-family:"Playfair Display",Georgia,serif;font-style:italic;line-height:1.15;}
.cover-sub{font-size:1rem;color:var(--muted);font-style:italic;max-width:520px;text-align:center;line-height:1.7;padding:0 2rem;}
.cover-btn{background:none;border:1px solid var(--accent);color:var(--accent);padding:.7rem 2rem;font-size:1rem;font-family:'Georgia',serif;border-radius:2px;transition:all .2s;pointer-events:none;}
.big-cover:hover .cover-btn{background:var(--accent);color:#000;}
.cover-key-hint{font-size:.8rem;color:#333;margin-top:.3rem;}

/* STUDY MODE */
.artist-nav{display:flex;border-bottom:1px solid var(--border);}
.artist-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:.75rem .5rem;font-size:.85rem;transition:all .2s;text-align:center;}
.artist-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.artist-tab:hover{color:var(--text);}

.artist-view{display:flex;height:calc(100vh - 130px);}
.painting-col{flex:1;background:#000;display:flex;flex-direction:column;min-width:0;}
/* FIXED image area — не прыгает */
.painting-stage{flex:1;position:relative;overflow:hidden;}
.painting-main{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;cursor:pointer;display:block;}
.painting-thumbs{display:flex;gap:2px;padding:2px;background:var(--border);height:64px;flex-shrink:0;}
.thumb-btn{flex:1;border:none;padding:0;background:none;cursor:pointer;opacity:.5;transition:opacity .2s;border:2px solid transparent;min-width:0;}
.thumb-btn.active{opacity:1;border-color:var(--accent);}
.thumb-btn:hover{opacity:.8;}
.thumb-btn img{width:100%;height:100%;object-fit:cover;display:block;}

.info-col{width:340px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;flex-shrink:0;}
.artist-name-big{font-size:1.6rem;font-weight:400;color:var(--accent);padding:1.5rem 1.5rem .75rem;border-bottom:1px solid var(--border);font-family:"Playfair Display",Georgia,serif;font-style:italic;}
.bio-text{padding:1.25rem 1.5rem;font-size:.9rem;line-height:1.8;color:#ccc;white-space:pre-line;flex:1;}
.hint-section{margin:0 1rem 1rem;padding:1rem;background:var(--surface2);border-radius:4px;border-left:3px solid var(--accent);}
.hint-label{font-size:.7rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;}
.hint-text{font-size:.85rem;line-height:1.6;color:#aaa;font-style:italic;}
.next-artist-btn{margin:1rem;padding:.75rem;background:none;border:1px solid var(--border);color:var(--muted);font-size:.85rem;border-radius:2px;text-align:center;transition:all .2s;}
.next-artist-btn:hover{border-color:var(--accent);color:var(--accent);}

/* QUIZ MODE — коллажи */
#quiz-mode{background:#000;min-height:calc(100vh - 50px);display:none;flex-direction:row;align-items:stretch;}
.collage-main{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;}
.collage-main img{max-width:100%;max-height:calc(100vh - 50px);object-fit:contain;display:block;}
.collage-counter{position:absolute;top:1rem;left:1.5rem;font-size:.8rem;color:rgba(255,255,255,.3);font-style:italic;}
.quiz-sidebar{width:120px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem .75rem;}
.guessed-btn{background:none;border:1px solid #4a7a4a;color:#7aba7a;padding:1rem .5rem;font-size:.85rem;font-family:'Georgia',serif;border-radius:2px;transition:all .2s;width:100%;text-align:center;line-height:1.5;}
.guessed-btn:hover{background:#1a3a1a;border-color:#7aba7a;}

/* ALL-AUTHORS QUIZ */
#all-quiz{display:none;}
.all-quiz-top{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);}
.all-quiz-view{display:flex;height:calc(100vh - 50px);}
.all-quiz-painting{flex:1;background:#000;position:relative;cursor:pointer;}
.all-quiz-painting img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
.all-quiz-side{width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1.25rem;gap:1rem;}
.all-quiz-title{font-size:1rem;color:var(--muted);font-style:italic;line-height:1.5;}
.all-quiz-progress{font-size:.8rem;color:#444;}
.artist-chips{display:flex;flex-direction:column;gap:.6rem;}
.artist-chip{background:none;border:1px solid var(--border);color:var(--muted);padding:.6rem 1rem;font-size:.9rem;font-family:'Georgia',serif;border-radius:2px;text-align:left;transition:all .15s;}
.artist-chip:hover{border-color:var(--accent);color:var(--text);}
.artist-chip.correct{background:#1a3a1a;border-color:#4a9a4a;color:#8eda8e;cursor:default;}
.artist-chip.wrong{background:#3a1a1a;border-color:#9a4a4a;color:#da8e8e;cursor:default;}
.all-quiz-feedback{font-size:.95rem;min-height:1.4rem;font-style:italic;}
.all-quiz-feedback.ok{color:#7aba7a;}
.all-quiz-feedback.err{color:#da8e8e;}
.all-quiz-next{background:none;border:1px solid var(--border);color:var(--muted);padding:.6rem 1rem;font-size:.85rem;font-family:'Georgia',serif;border-radius:2px;transition:all .2s;text-align:center;display:none;}
.all-quiz-next:hover{border-color:var(--accent);color:var(--accent);}
.all-quiz-score{font-size:1.8rem;font-weight:400;color:var(--accent);font-family:"Playfair Display",Georgia,serif;}

/* CONFETTI */
.confetti-piece{position:fixed;top:-10px;pointer-events:none;z-index:9999;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.star-burst{position:fixed;pointer-events:none;z-index:9999;font-size:2rem;animation:starPop .6s ease-out forwards;}
@keyframes starPop{0%{transform:scale(0);opacity:1;}60%{transform:scale(1.4);opacity:1;}100%{transform:scale(0);opacity:0;}}

@media(max-width:768px){
  .artist-view{flex-direction:column;}
  .info-col{width:100%;border-left:none;border-top:1px solid var(--border);}
  .gallery-top{flex-wrap:wrap;}
  #quiz-mode{flex-direction:column;}
  .quiz-sidebar{width:100%;height:70px;flex-direction:row;border-left:none;border-top:1px solid var(--border);}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="home-header">
    <h1>Угадай художника</h1>
    <div class="author">Игра Олеси Лихуновой</div>
  </div>
  <div class="trio-grid" id="trio-grid"></div>
  <div class="home-all-quiz">
    <button class="all-quiz-btn" onclick="openAllQuiz()">Угадывать по всем художникам →</button>
    <div class="all-quiz-hint">Одна картина — три варианта — кто это нарисовал?</div>
  </div>
</div>

<!-- GALLERY (trio) -->
<div id="gallery">
  <div class="gallery-top">
    <button class="back-btn" onclick="goHome()">← Все тройки</button>
    <div class="gallery-title" id="gallery-title"></div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-study" onclick="setMode('study')">Изучить</button>
      <button class="mode-tab" id="tab-quiz" onclick="setMode('quiz')">Угадать</button>
    </div>
  </div>

  <!-- ARTIST COVER -->
  <div id="artist-cover" class="big-cover" onclick="startArtist()">
    <div class="cover-num" id="cover-num"></div>
    <div class="cover-name" id="cover-name"></div>
    <div class="cover-sub" id="cover-hint"></div>
    <div class="cover-btn">Смотреть картины →</div>
    <div class="cover-key-hint">нажмите в любом месте или стрелку</div>
  </div>

  <!-- QUIZ INTRO COVER -->
  <div id="quiz-cover" class="big-cover" onclick="startQuiz()">
    <div class="cover-num">Время угадывать</div>
    <div class="cover-name">Готовы?</div>
    <div class="cover-sub" id="quiz-cover-sub"></div>
    <div class="cover-btn">Показать коллажи →</div>
    <div class="cover-key-hint">нажмите в любом месте или стрелку</div>
  </div>

  <!-- STUDY -->
  <div id="study-mode" style="display:none;">
    <div class="artist-nav" id="artist-nav"></div>
    <div class="artist-view">
      <div class="painting-col">
        <div class="painting-stage">
          <img id="painting-main" class="painting-main" src="" alt="" onclick="navPainting(1)">
        </div>
        <div class="painting-thumbs" id="painting-thumbs"></div>
      </div>
      <div class="info-col">
        <div class="artist-name-big" id="artist-name-big"></div>
        <div class="bio-text" id="bio-text"></div>
        <div class="hint-section">
          <div class="hint-label">Подсказка родителю</div>
          <div class="hint-text" id="hint-text"></div>
        </div>
        <button class="next-artist-btn" id="next-artist-btn" onclick="nextArtist()"></button>
      </div>
    </div>
  </div>

  <!-- QUIZ (collages) -->
  <div id="quiz-mode">
    <div class="collage-main" onclick="colladeNext()">
      <img id="collage-img" src="" alt="">
      <div class="collage-counter" id="collage-counter"></div>
    </div>
    <div class="quiz-sidebar">
      <button class="guessed-btn" onclick="celebrate(event); colladeNext()">🎉<br>Угадали!</button>
    </div>
  </div>
</div>

<!-- ALL-AUTHORS QUIZ -->
<div id="all-quiz">
  <div class="all-quiz-top">
    <button class="back-btn" onclick="goHome()">← На главную</button>
    <div class="gallery-title">Угадай художника — все авторы</div>
  </div>
  <div class="all-quiz-view">
    <div class="all-quiz-painting" onclick="aqNext()">
      <img id="aq-img" src="" alt="">
    </div>
    <div class="all-quiz-side">
      <div class="all-quiz-title" id="aq-title">Чья это картина?</div>
      <div class="all-quiz-progress" id="aq-progress"></div>
      <div class="artist-chips" id="aq-chips"></div>
      <div class="all-quiz-feedback" id="aq-feedback"></div>
      <button class="all-quiz-next" id="aq-next" onclick="aqNext()">Следующая →</button>
      <div class="all-quiz-score" id="aq-score" style="display:none;"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── STATE ──
let currentTrio = null;
let currentArtistIdx = 0;
let currentPaintingIdx = 0;
let showingCover = false;
let showingQuizCover = false;
let collageIdx = 0;

function hideAll() {
  ['artist-cover','quiz-cover','study-mode','quiz-mode','gallery','all-quiz','home'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  showingCover = false;
  showingQuizCover = false;
}

// ── HOME ──
function renderHome() {
  const grid = document.getElementById('trio-grid');
  grid.innerHTML = '';
  DATA.trios.forEach((trio, i) => {
    const card = document.createElement('div');
    card.className = 'trio-card';
    card.onclick = () => openTrio(i);
    card.innerHTML = `
      <img class="trio-thumb" src="${trio.collages[0]}" alt="${trio.title}" loading="lazy">
      <div class="trio-info">
        <div class="trio-num">Тройка ${i+1}</div>
        <div class="trio-title">${trio.title}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function goHome() {
  hideAll();
  document.getElementById('home').style.display = '';
}

// ── TRIO ──
function openTrio(idx) {
  currentTrio = DATA.trios[idx];
  currentArtistIdx = 0;
  currentPaintingIdx = 0;
  hideAll();
  document.getElementById('gallery').style.display = 'block';
  document.getElementById('gallery-title').textContent = currentTrio.title;
  setMode('study');
}

function setMode(mode) {
  document.getElementById('tab-study').classList.toggle('active', mode === 'study');
  document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('artist-cover').style.display = 'none';
  document.getElementById('quiz-cover').style.display = 'none';
  document.getElementById('study-mode').style.display = 'none';
  document.getElementById('quiz-mode').style.display = 'none';
  showingCover = false;
  showingQuizCover = false;
  if (mode === 'study') showCover(currentArtistIdx);
  if (mode === 'quiz') showQuizCover();
}

// ── ARTIST COVER ──
function showCover(artistIdx) {
  showingCover = true;
  document.getElementById('study-mode').style.display = 'none';
  document.getElementById('quiz-cover').style.display = 'none';
  const artist = currentTrio.artists[artistIdx];
  document.getElementById('cover-num').textContent = `Художник ${artistIdx + 1} из ${currentTrio.artists.length}`;
  document.getElementById('cover-name').textContent = artist.name;
  document.getElementById('cover-hint').textContent = artist.hint;
  document.getElementById('artist-cover').style.display = 'flex';
}

function startArtist() {
  showingCover = false;
  document.getElementById('artist-cover').style.display = 'none';
  document.getElementById('study-mode').style.display = 'block';
  currentPaintingIdx = 0;
  renderStudy();
}

// ── QUIZ COVER ──
function showQuizCover() {
  showingQuizCover = true;
  document.getElementById('artist-cover').style.display = 'none';
  document.getElementById('study-mode').style.display = 'none';
  document.getElementById('quiz-mode').style.display = 'none';
  const names = currentTrio.artists.map(a => a.name).join(', ');
  document.getElementById('quiz-cover-sub').textContent = `Вы изучили: ${names}. Посмотрите на коллажи — угадайте кто есть кто!`;
  document.getElementById('quiz-cover').style.display = 'flex';
}

function startQuiz() {
  showingQuizCover = false;
  document.getElementById('quiz-cover').style.display = 'none';
  collageIdx = 0;
  renderCollage();
  document.getElementById('quiz-mode').style.display = 'flex';
}

// ── STUDY ──
function renderStudy() {
  const nav = document.getElementById('artist-nav');
  nav.innerHTML = '';
  currentTrio.artists.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'artist-tab' + (i === currentArtistIdx ? ' active' : '');
    btn.textContent = a.name;
    btn.onclick = () => { currentArtistIdx = i; showCover(i); };
    nav.appendChild(btn);
  });
  renderArtist();
}

function renderArtist() {
  const artist = currentTrio.artists[currentArtistIdx];
  document.getElementById('artist-name-big').textContent = artist.name;
  document.getElementById('bio-text').textContent = artist.bio;
  document.getElementById('hint-text').textContent = artist.hint;
  document.getElementById('painting-main').src = artist.images[currentPaintingIdx];

  const thumbs = document.getElementById('painting-thumbs');
  thumbs.innerHTML = '';
  artist.images.forEach((src, i) => {
    const btn = document.createElement('button');
    btn.className = 'thumb-btn' + (i === currentPaintingIdx ? ' active' : '');
    btn.innerHTML = `<img src="${src}" loading="lazy">`;
    btn.onclick = () => { currentPaintingIdx = i; renderArtist(); };
    thumbs.appendChild(btn);
  });

  const nextBtn = document.getElementById('next-artist-btn');
  nextBtn.textContent = currentArtistIdx < currentTrio.artists.length - 1
    ? `Следующий художник: ${currentTrio.artists[currentArtistIdx + 1].name} →`
    : 'Перейти к угадыванию →';
}

function nextArtist() {
  if (currentArtistIdx < currentTrio.artists.length - 1) {
    currentArtistIdx++;
    currentPaintingIdx = 0;
    showCover(currentArtistIdx);
  } else {
    setMode('quiz');
  }
}

function navPainting(dir) {
  const artist = currentTrio.artists[currentArtistIdx];
  const newIdx = currentPaintingIdx + dir;
  if (newIdx >= artist.images.length) {
    if (currentArtistIdx < currentTrio.artists.length - 1) {
      currentArtistIdx++;
      currentPaintingIdx = 0;
      showCover(currentArtistIdx);
    } else { setMode('quiz'); }
    return;
  }
  if (newIdx < 0) { showCover(currentArtistIdx); return; }
  currentPaintingIdx = newIdx;
  renderArtist();
}

// ── QUIZ COLLAGES ──
function renderCollage() {
  const collages = currentTrio.collages;
  document.getElementById('collage-img').src = collages[collageIdx];
  document.getElementById('collage-counter').textContent = `${collageIdx + 1} / ${collages.length}`;
}

function colladeNext() {
  const max = currentTrio.collages.length - 1;
  if (collageIdx < max) {
    collageIdx++;
    renderCollage();
  } else {
    // После последнего коллажа — на главную
    goHome();
  }
}

// ── ALL-AUTHORS QUIZ ──
let aqQuestions = [];
let aqCurrent = 0;
let aqScore = 0;
let aqAnswered = false;

function openAllQuiz() {
  aqQuestions = buildAllQuestions();
  aqCurrent = 0;
  aqScore = 0;
  aqAnswered = false;
  hideAll();
  document.getElementById('all-quiz').style.display = 'block';
  renderAQQuestion();
}

function buildAllQuestions() {
  const all = [];
  DATA.trios.forEach(trio => {
    trio.artists.forEach(artist => {
      artist.images.forEach((img, i) => {
        if (i < 5) { // берём первые 5 картин каждого художника
          all.push({ img, correct: artist.name, trio });
        }
      });
    });
  });
  // shuffle
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all;
}

function getOptions(q) {
  const correct = q.correct;
  const trio = q.trio;
  // Берём двух других из той же тройки
  const others = trio.artists.filter(a => a.name !== correct).map(a => a.name);
  const opts = [correct, ...others];
  // shuffle
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return opts;
}

function renderAQQuestion() {
  const q = aqQuestions[aqCurrent];
  document.getElementById('aq-img').src = q.img;
  document.getElementById('aq-progress').textContent = `${aqCurrent + 1} / ${aqQuestions.length}`;
  document.getElementById('aq-feedback').textContent = '';
  document.getElementById('aq-feedback').className = 'all-quiz-feedback';
  document.getElementById('aq-next').style.display = 'none';
  document.getElementById('aq-score').style.display = 'none';
  aqAnswered = false;

  const chips = document.getElementById('aq-chips');
  chips.innerHTML = '';
  getOptions(q).forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'artist-chip';
    btn.textContent = name;
    btn.onclick = () => aqAnswer(name, q.correct);
    chips.appendChild(btn);
  });
}

function aqAnswer(chosen, correct) {
  if (aqAnswered) return;
  aqAnswered = true;
  const isOk = chosen === correct;
  if (isOk) aqScore++;

  document.querySelectorAll('.artist-chip').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
    else if (b.textContent === chosen && !isOk) b.classList.add('wrong');
  });

  const fb = document.getElementById('aq-feedback');
  fb.textContent = isOk ? `Верно!` : `Это ${correct}`;
  fb.className = 'all-quiz-feedback ' + (isOk ? 'ok' : 'err');

  const nextBtn = document.getElementById('aq-next');
  if (aqCurrent < aqQuestions.length - 1) {
    nextBtn.textContent = 'Следующая →';
    nextBtn.style.display = 'block';
  } else {
    nextBtn.style.display = 'none';
    const score = document.getElementById('aq-score');
    score.textContent = `${aqScore} / ${aqQuestions.length}`;
    score.style.display = 'block';
  }
}

function aqNext() {
  if (!aqAnswered) return;
  aqCurrent++;
  if (aqCurrent < aqQuestions.length) renderAQQuestion();
}

// ── КЛАВИАТУРА ──
document.addEventListener('keydown', e => {
  // All-quiz
  if (document.getElementById('all-quiz').style.display !== 'none') {
    if (e.key === 'ArrowRight') aqNext();
    return;
  }

  if (!currentTrio) return;
  const quizVisible = document.getElementById('quiz-mode').style.display === 'flex';

  if (quizVisible) {
    if (e.key === 'ArrowRight') colladeNext();
    if (e.key === 'ArrowLeft') { collageIdx = Math.max(0, collageIdx - 1); renderCollage(); }
    return;
  }
  if (showingQuizCover) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); startQuiz(); }
    return;
  }
  if (showingCover) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); startArtist(); }
    return;
  }
  if (e.key === 'ArrowRight') navPainting(1);
  if (e.key === 'ArrowLeft') navPainting(-1);
});

// ── CELEBRATE ──
function celebrate(e) {
  e && e.stopPropagation();
  const colors = ['#c8a96e','#e8c88e','#f5a623','#7bc67e','#64b5f6','#f48fb1','#ce93d8','#fff'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.2}s;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 18);
  }
  const emojis = ['⭐','🌟','✨','🎊','🎉','🥳','👏','💫'];
  const cx = e ? e.clientX : window.innerWidth/2;
  const cy = e ? e.clientY : window.innerHeight/2;
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'star-burst';
      const angle = (i/8)*Math.PI*2;
      const dist = 60+Math.random()*70;
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.cssText = `left:${cx+Math.cos(angle)*dist}px;top:${cy+Math.sin(angle)*dist}px;animation-delay:${i*40}ms;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 700);
    }, i * 40);
  }
}

renderHome();
</script>
