<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семейная галерея</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;
  --surface:#141414;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --text:#f0f0f0;
  --muted:#888;
  --accent:#c8a96e;
}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;font-family:inherit;}

/* HOME */
#home{padding:0;}
.home-header{padding:3rem 2rem 2rem;text-align:center;border-bottom:1px solid var(--border);}
.home-header h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:400;letter-spacing:.08em;color:var(--accent);margin-bottom:.5rem;}
.home-header p{font-size:1rem;color:var(--muted);font-style:italic;}

.trio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1px;background:var(--border);}
.trio-card{background:var(--surface);padding:0;cursor:pointer;transition:background .2s;overflow:hidden;}
.trio-card:hover{background:var(--surface2);}
.trio-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;opacity:.85;transition:opacity .3s;}
.trio-card:hover .trio-thumb{opacity:1;}
.trio-info{padding:1.25rem 1.5rem 1.5rem;}
.trio-num{font-size:.75rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.4rem;}
.trio-title{font-size:1.05rem;color:var(--text);line-height:1.4;}

/* GALLERY */
#gallery{display:none;}
.gallery-top{display:flex;align-items:center;gap:1rem;padding:.75rem 1.5rem;border-bottom:1px solid var(--border);background:var(--surface);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .9rem;font-size:.85rem;border-radius:2px;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.gallery-title{font-size:.95rem;color:var(--muted);font-style:italic;flex:1;text-align:center;}
.mode-tabs{display:flex;gap:1px;background:var(--border);}
.mode-tab{background:var(--surface2);border:none;color:var(--muted);padding:.4rem 1rem;font-size:.8rem;letter-spacing:.05em;transition:all .2s;}
.mode-tab.active{background:var(--accent);color:#000;}

/* ARTIST COVER */
#artist-cover{display:none;min-height:calc(100vh - 50px);align-items:center;justify-content:center;flex-direction:column;gap:2rem;background:var(--bg);}
.cover-num{font-size:.85rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;}
.cover-name{font-size:clamp(3rem,8vw,7rem);font-weight:400;color:var(--accent);letter-spacing:.06em;text-align:center;padding:0 1rem;}
.cover-hint{font-size:1rem;color:var(--muted);font-style:italic;max-width:500px;text-align:center;line-height:1.7;padding:0 2rem;}
.cover-start{background:none;border:1px solid var(--accent);color:var(--accent);padding:.7rem 2rem;font-size:1rem;font-family:'Georgia',serif;border-radius:2px;transition:all .2s;margin-top:1rem;}
.cover-start:hover{background:var(--accent);color:#000;}
.cover-key-hint{font-size:.8rem;color:var(--border);margin-top:.5rem;}

/* STUDY MODE */
.artist-nav{display:flex;border-bottom:1px solid var(--border);}
.artist-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:.75rem .5rem;font-size:.85rem;transition:all .2s;text-align:center;}
.artist-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.artist-tab:hover{color:var(--text);}

.artist-view{display:flex;min-height:calc(100vh - 130px);}
.painting-col{flex:1;position:relative;background:#000;display:flex;flex-direction:column;}
.painting-main{width:100%;flex:1;object-fit:contain;display:block;cursor:pointer;}
.painting-thumbs{display:flex;gap:2px;padding:2px;background:var(--border);}
.thumb-btn{flex:1;border:none;padding:0;background:none;cursor:pointer;opacity:.5;transition:opacity .2s;border:2px solid transparent;}
.thumb-btn.active{opacity:1;border-color:var(--accent);}
.thumb-btn:hover{opacity:.8;}
.thumb-btn img{width:100%;aspect-ratio:1;object-fit:cover;display:block;}

.info-col{width:340px;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.artist-name-big{font-size:1.6rem;font-weight:400;color:var(--accent);padding:1.5rem 1.5rem .75rem;border-bottom:1px solid var(--border);}
.bio-text{padding:1.25rem 1.5rem;font-size:.9rem;line-height:1.8;color:#ccc;white-space:pre-line;flex:1;}
.hint-section{margin:0 1rem 1rem;padding:1rem;background:var(--surface2);border-radius:4px;border-left:3px solid var(--accent);}
.hint-label{font-size:.7rem;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;}
.hint-text{font-size:.85rem;line-height:1.6;color:#aaa;font-style:italic;}
.next-artist-btn{margin:1rem;padding:.75rem;background:none;border:1px solid var(--border);color:var(--muted);font-size:.85rem;border-radius:2px;text-align:center;transition:all .2s;}
.next-artist-btn:hover{border-color:var(--accent);color:var(--accent);}

/* QUIZ MODE */
#quiz-mode{background:#000;min-height:calc(100vh - 50px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;}
.collage-frame{width:100%;max-width:1100px;}
.collage-frame img{width:100%;max-height:calc(100vh - 180px);object-fit:contain;display:block;border-radius:2px;}
.collage-nav{display:flex;align-items:center;justify-content:center;gap:2rem;margin-top:1.5rem;}
.coll-nav-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.55rem 1.4rem;font-size:.9rem;font-family:'Georgia',serif;border-radius:2px;transition:all .2s;}
.coll-nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.coll-nav-btn:disabled{opacity:.3;cursor:default;}
.coll-counter{font-size:.85rem;color:var(--muted);font-style:italic;min-width:80px;text-align:center;}
.reveal-bar{margin-top:1.2rem;text-align:center;}
.reveal-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.45rem 1.2rem;font-size:.8rem;font-family:'Georgia',serif;border-radius:2px;transition:all .2s;letter-spacing:.05em;}
.reveal-btn:hover{border-color:var(--accent);color:var(--accent);}
.reveal-answer{margin-top:.75rem;font-size:1.1rem;color:var(--accent);font-style:italic;min-height:1.5rem;transition:opacity .3s;opacity:0;}
.reveal-answer.show{opacity:1;}

@media(max-width:768px){
  .artist-view{flex-direction:column;}
  .info-col{width:100%;border-left:none;border-top:1px solid var(--border);}
  .painting-main{height:55vw;}
  .gallery-top{flex-wrap:wrap;}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="home-header">
    <h1>Семейная галерея</h1>
    <p>Смотрим картины вместе — угадываем художника</p>
  </div>
  <div class="trio-grid" id="trio-grid"></div>
</div>

<!-- GALLERY -->
<div id="gallery">
  <div class="gallery-top">
    <button class="back-btn" onclick="goHome()">← Все тройки</button>
    <div class="gallery-title" id="gallery-title"></div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-study" onclick="setMode('study')">Изучить</button>
      <button class="mode-tab" id="tab-quiz" onclick="setMode('quiz')">Угадать</button>
    </div>
  </div>

  <!-- ARTIST COVER -->
  <div id="artist-cover">
    <div class="cover-num" id="cover-num"></div>
    <div class="cover-name" id="cover-name"></div>
    <div class="cover-hint" id="cover-hint"></div>
    <button class="cover-start" onclick="startArtist()">Смотреть картины →</button>
    <div class="cover-key-hint">или нажмите любую стрелку</div>
  </div>

  <!-- STUDY -->
  <div id="study-mode" style="display:none;">
    <div class="artist-nav" id="artist-nav"></div>
    <div class="artist-view">
      <div class="painting-col">
        <img id="painting-main" class="painting-main" src="" alt="" onclick="navPainting(1)">
        <div class="painting-thumbs" id="painting-thumbs"></div>
      </div>
      <div class="info-col">
        <div class="artist-name-big" id="artist-name-big"></div>
        <div class="bio-text" id="bio-text"></div>
        <div class="hint-section">
          <div class="hint-label">Подсказка родителю</div>
          <div class="hint-text" id="hint-text"></div>
        </div>
        <button class="next-artist-btn" id="next-artist-btn" onclick="nextArtist()"></button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-mode" style="display:none;">
    <div class="collage-frame">
      <img id="collage-img" src="" alt="">
      <div class="reveal-bar">
        <button class="reveal-btn" onclick="toggleReveal()">Показать имена</button>
        <div class="reveal-answer" id="reveal-answer"></div>
      </div>
    </div>
    <div class="collage-nav">
      <button class="coll-nav-btn" id="coll-prev" onclick="collNav(-1)">← Назад</button>
      <div class="coll-counter" id="coll-counter"></div>
      <button class="coll-nav-btn" id="coll-next" onclick="collNav(1)">Вперёд →</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
let currentTrio = null;
let currentArtistIdx = 0;
let currentPaintingIdx = 0;
let showingCover = false;

// HOME
function renderHome() {
  const grid = document.getElementById('trio-grid');
  grid.innerHTML = '';
  DATA.trios.forEach((trio, i) => {
    const card = document.createElement('div');
    card.className = 'trio-card';
    card.onclick = () => openTrio(i);
    card.innerHTML = `
      <img class="trio-thumb" src="${trio.collages[0]}" alt="${trio.title}" loading="lazy">
      <div class="trio-info">
        <div class="trio-num">Тройка ${i+1}</div>
        <div class="trio-title">${trio.title}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function goHome() {
  document.getElementById('home').style.display = '';
  document.getElementById('gallery').style.display = 'none';
}

// TRIO
function openTrio(idx) {
  currentTrio = DATA.trios[idx];
  currentArtistIdx = 0;
  currentPaintingIdx = 0;
  document.getElementById('home').style.display = 'none';
  document.getElementById('gallery').style.display = 'block';
  document.getElementById('gallery-title').textContent = currentTrio.title;
  setMode('study');
}

function setMode(mode) {
  document.getElementById('tab-study').classList.toggle('active', mode === 'study');
  document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('quiz-mode').style.display = mode === 'quiz' ? 'flex' : 'none';
  if (mode === 'study') {
    showCover(currentArtistIdx);
  }
  if (mode === 'quiz') {
    document.getElementById('artist-cover').style.display = 'none';
    document.getElementById('study-mode').style.display = 'none';
    initQuiz();
  }
}

// ARTIST COVER
function showCover(artistIdx) {
  showingCover = true;
  document.getElementById('study-mode').style.display = 'none';
  const artist = currentTrio.artists[artistIdx];
  document.getElementById('cover-num').textContent = `Художник ${artistIdx + 1} из ${currentTrio.artists.length}`;
  document.getElementById('cover-name').textContent = artist.name;
  document.getElementById('cover-hint').textContent = artist.hint;
  document.getElementById('artist-cover').style.display = 'flex';
}

function startArtist() {
  showingCover = false;
  document.getElementById('artist-cover').style.display = 'none';
  document.getElementById('study-mode').style.display = 'block';
  currentPaintingIdx = 0;
  renderStudy();
}

// STUDY
function renderStudy() {
  const trio = currentTrio;
  const nav = document.getElementById('artist-nav');
  nav.innerHTML = '';
  trio.artists.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'artist-tab' + (i === currentArtistIdx ? ' active' : '');
    btn.textContent = a.name;
    btn.onclick = () => { currentArtistIdx = i; showCover(i); };
    nav.appendChild(btn);
  });
  renderArtist();
}

function renderArtist() {
  const artist = currentTrio.artists[currentArtistIdx];
  document.getElementById('artist-name-big').textContent = artist.name;
  document.getElementById('bio-text').textContent = artist.bio;
  document.getElementById('hint-text').textContent = artist.hint;

  document.getElementById('painting-main').src = artist.images[currentPaintingIdx];

  const thumbs = document.getElementById('painting-thumbs');
  thumbs.innerHTML = '';
  artist.images.forEach((src, i) => {
    const btn = document.createElement('button');
    btn.className = 'thumb-btn' + (i === currentPaintingIdx ? ' active' : '');
    btn.innerHTML = `<img src="${src}" loading="lazy">`;
    btn.onclick = () => { currentPaintingIdx = i; renderArtist(); };
    thumbs.appendChild(btn);
  });

  const nextBtn = document.getElementById('next-artist-btn');
  if (currentArtistIdx < currentTrio.artists.length - 1) {
    nextBtn.textContent = `Следующий художник: ${currentTrio.artists[currentArtistIdx + 1].name} →`;
  } else {
    nextBtn.textContent = 'Перейти к угадыванию →';
  }
}

function nextArtist() {
  if (currentArtistIdx < currentTrio.artists.length - 1) {
    currentArtistIdx++;
    currentPaintingIdx = 0;
    showCover(currentArtistIdx);
  } else {
    setMode('quiz');
  }
}

// НАВИГАЦИЯ ПО КАРТИНАМ
function navPainting(dir) {
  const artist = currentTrio.artists[currentArtistIdx];
  const newIdx = currentPaintingIdx + dir;

  if (newIdx >= artist.images.length) {
    if (currentArtistIdx < currentTrio.artists.length - 1) {
      currentArtistIdx++;
      currentPaintingIdx = 0;
      showCover(currentArtistIdx);
    } else {
      setMode('quiz');
    }
    return;
  }

  if (newIdx < 0) {
    showCover(currentArtistIdx);
    return;
  }

  currentPaintingIdx = newIdx;
  renderArtist();
}

// КЛАВИАТУРА
document.addEventListener('keydown', e => {
  if (!currentTrio) return;
  const quizVisible = document.getElementById('quiz-mode').style.display !== 'none';

  if (quizVisible) {
    if (e.key === 'ArrowRight') collNav(1);
    if (e.key === 'ArrowLeft') collNav(-1);
    return;
  }

  if (showingCover) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === ' ') {
      e.preventDefault();
      startArtist();
    }
    return;
  }

  if (e.key === 'ArrowRight') navPainting(1);
  if (e.key === 'ArrowLeft') navPainting(-1);
});

// QUIZ
let collageIdx = 0;
let revealShown = false;

function initQuiz() {
  collageIdx = 0;
  revealShown = false;
  renderCollage();
}

function renderCollage() {
  const collages = currentTrio.collages;
  document.getElementById('collage-img').src = collages[collageIdx];
  document.getElementById('coll-counter').textContent = `${collageIdx + 1} / ${collages.length}`;
  document.getElementById('coll-prev').disabled = collageIdx === 0;
  document.getElementById('coll-next').disabled = collageIdx === collages.length - 1;
  revealShown = false;
  const ans = document.getElementById('reveal-answer');
  ans.classList.remove('show');
  ans.textContent = '';
}

function collNav(dir) {
  collageIdx = Math.max(0, Math.min(currentTrio.collages.length - 1, collageIdx + dir));
  renderCollage();
}

function toggleReveal() {
  revealShown = !revealShown;
  const ans = document.getElementById('reveal-answer');
  if (revealShown) {
    ans.textContent = currentTrio.artists.map(a => a.name).join(' · ');
    ans.classList.add('show');
  } else {
    ans.classList.remove('show');
  }
}

renderHome();
</script>
</body>
</html>
